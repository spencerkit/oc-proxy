name: Release Build

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    name: Package (${{ matrix.os_name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            os_name: macos
          - os: windows-latest
            os_name: windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Package app
        run: npm run tauri:build

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai-open-router-${{ matrix.os_name }}-${{ github.ref_name }}
          path: |
            dist/target/release/bundle/**
            dist/target/*/release/bundle/**
            dist/*.dmg
            dist/*-setup.exe
          if-no-files-found: error
