name: Release Build

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    name: Package (${{ matrix.os_name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            os_name: macos
          - os: windows-latest
            os_name: windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0.0" --locked

      - name: Install dependencies
        run: npm ci

      - name: Package app
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/dist/target
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          cargo tauri build
          cargo build --release --bin ai-open-router --manifest-path src-tauri/Cargo.toml
          npm run tauri:collect
          bash ./scripts/package-headless-artifacts.sh "${{ github.workspace }}/dist/target/release/ai-open-router"

      - name: Normalize artifact ref name
        id: artifact_ref
        shell: bash
        run: |
          SAFE_REF_NAME="${GITHUB_REF_NAME//\//-}"
          SAFE_REF_NAME="$(echo "${SAFE_REF_NAME}" | tr -c 'A-Za-z0-9._-' '-')"
          SAFE_REF_NAME="$(echo "${SAFE_REF_NAME}" | sed 's/^-*//; s/-*$//')"
          if [[ -z "${SAFE_REF_NAME}" ]]; then
            SAFE_REF_NAME="unknown-ref"
          fi
          echo "value=${SAFE_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai-open-router-${{ matrix.os_name }}-${{ steps.artifact_ref.outputs.value }}
          path: |
            dist/*.dmg
            dist/*-setup.exe
            dist/*.msi
            dist/*.app.tar.gz
            dist/*.AppImage
            dist/*.sig
            dist/ai-open-router-*.tar.gz
            dist/ai-open-router-*.zip
            dist/ai-open-router-*
            dist/latest.json
            dist/latest.json.sig
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - package
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release version
        id: release
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            TAG="${GITHUB_REF_NAME}"
          else
            VERSION="$(node -p "require('./package.json').version")"
            TAG="v${VERSION}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Extract changelog section
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          node ./scripts/extract-changelog.js --version "${VERSION}" --output /tmp/release-notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          body_path: /tmp/release-notes.md
          files: |
            release-artifacts/*.dmg
            release-artifacts/*-setup.exe
            release-artifacts/*.msi
            release-artifacts/*.app.tar.gz
            release-artifacts/*.AppImage
            release-artifacts/*.sig
            release-artifacts/latest.json
            release-artifacts/latest.json.sig

  publish_npm:
    name: Publish npm CLI
    runs-on: ubuntu-latest
    needs:
      - publish
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Verify versions
        run: node ./scripts/check-version-sync.js

      - name: Publish to npm
        working-directory: packages/aor-cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
