name: Release Build

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    name: Package (${{ matrix.os_name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            os_name: linux
            bundles: deb,appimage
          - os: macos-latest
            os_name: macos
            bundles: app,dmg
          - os: windows-latest
            os_name: windows
            bundles: nsis

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org
          scope: "@spencer-kit"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies (Tauri)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            librsvg2-dev \
            patchelf \
            pkg-config \
            wget

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0.0" --locked

      - name: Install dependencies
        run: npm ci

      - name: Package app
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/dist/target
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          cargo tauri build --bundles "${{ matrix.bundles }}"
          cargo build --release --bin ai-open-router --manifest-path src-tauri/Cargo.toml
          npm run tauri:collect
          bash ./scripts/sign-updater-artifacts.sh
          bash ./scripts/package-headless-artifacts.sh "${{ github.workspace }}/dist/target/release/ai-open-router"

      - name: Stage updater manifest
        shell: bash
        run: |
          mkdir -p dist/updater
          if [[ -f dist/latest.json ]]; then
            cp -f dist/latest.json "dist/updater/latest-${{ matrix.os_name }}.json"
          fi

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai-open-router-${{ matrix.os_name }}-${{ github.ref_name }}
          path: |
            dist/*.dmg
            dist/*.deb
            dist/*.rpm
            dist/*-setup.exe
            dist/*.msi
            dist/*-setup.exe.zip
            dist/*.msi.zip
            dist/*.app.tar.gz
            dist/*.AppImage
            dist/*.sig
            dist/ai-open-router-*.tar.gz
            dist/ai-open-router-*.zip
            dist/ai-open-router-*
            dist/updater/latest-*.json
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - package
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release version
        id: release
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            TAG="${GITHUB_REF_NAME}"
          else
            VERSION="$(node -p "require('./package.json').version")"
            TAG="v${VERSION}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Merge updater manifests
        run: |
          node ./scripts/merge-updater-manifests.js \
            --input release-artifacts \
            --output release-artifacts/latest.json \
            --repo "${{ github.repository }}" \
            --tag "${{ steps.release.outputs.tag }}" \
            --version "${{ steps.release.outputs.version }}"

      - name: Prepare release payload
        shell: bash
        run: |
          mkdir -p release-publish
          while IFS= read -r -d '' file; do
            name="$(basename "${file}")"
            case "${name}" in
              latest.json.sig)
                ;;
              *.dmg|*.deb|*.rpm|*-setup.exe|*.msi|*-setup.exe.zip|*.msi.zip|*.app.tar.gz|*.AppImage|*.sig|ai-open-router-*.tar.gz|ai-open-router-*.zip|ai-open-router-*.exe|latest.json)
                cp -f "${file}" release-publish/
                ;;
              ai-open-router-darwin-*|ai-open-router-linux-*)
                if [[ "${name}" != *.tar.gz && "${name}" != *.zip ]]; then
                  cp -f "${file}" release-publish/
                fi
                ;;
            esac
          done < <(find release-artifacts -type f -print0)

      - name: Extract changelog section
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          node ./scripts/extract-changelog.js --version "${VERSION}" --output /tmp/release-notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          body_path: /tmp/release-notes.md
          files: release-publish/*

  publish_npm:
    name: Publish npm CLI
    runs-on: ubuntu-latest
    needs:
      - publish
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org
          scope: "@spencer-kit"

      - name: Verify versions
        run: node ./scripts/check-version-sync.js

      - name: Publish to npm
        working-directory: packages/aor-cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
