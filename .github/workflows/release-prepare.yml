name: Release Prepare

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Bump strategy when version is empty"
        type: choice
        required: true
        default: auto
        options:
          - auto
          - patch
          - minor
          - major
      version:
        description: "Explicit version (e.g. 0.3.0), overrides bump"
        type: string
        required: false
      base_branch:
        description: "Target branch for release PR"
        type: string
        required: true
        default: main

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    name: Prepare release PR
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ format('refs/heads/{0}', inputs.base_branch) }}
          fetch-depth: 0

      - name: Normalize checked out base branch
        run: |
          CURRENT_BRANCH="$(git symbolic-ref HEAD --short)"
          NORMALIZED_BRANCH="${CURRENT_BRANCH#heads/}"
          if git rev-parse -q --verify "refs/tags/$NORMALIZED_BRANCH" >/dev/null; then
            git tag -d "$NORMALIZED_BRANCH"
          fi
          if [ "$CURRENT_BRANCH" != "$NORMALIZED_BRANCH" ]; then
            git switch "$NORMALIZED_BRANCH"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare version and changelog
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            npm run release:prepare -- --version "${{ inputs.version }}"
          else
            npm run release:prepare -- --bump "${{ inputs.bump }}"
          fi

      - name: Read version
        id: version
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create release PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: release/v${{ steps.version.outputs.version }}
          base: ${{ inputs.base_branch }}
          commit-message: "chore(release): v${{ steps.version.outputs.version }}"
          title: "chore(release): v${{ steps.version.outputs.version }}"
          body: |
            This PR was auto-generated by `Release Prepare`.

            Includes:
            - Version bump for Node/Tauri/Rust manifests
            - Generated `CHANGELOG.md` entry

            After merge, push tag `v${{ steps.version.outputs.version }}` to trigger release build.
