name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (Node 20)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Install Linux system dependencies (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Check version sync
        run: npm run version:check

      - name: Run CI checks
        run: npm run ci

      - name: Cargo check (Tauri backend)
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Cargo fmt check (Tauri backend)
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Cargo clippy (Tauri backend)
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets

      - name: Tauri module boundary check
        run: bash ./scripts/check-tauri-boundaries.sh

      - name: Cargo test (Tauri backend)
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Cargo contract tests (Tauri backend)
        run: cargo test --manifest-path src-tauri/Cargo.toml contract_

  linux_smoke_ubuntu22:
    name: Linux Smoke (Ubuntu 22.04)
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Install Linux system dependencies (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            librsvg2-dev \
            patchelf \
            pkg-config \
            wget

      - name: Build renderer assets
        run: npm run build

      - name: Build headless binary
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/dist/target
        run: cargo build --release --bin ai-open-router --manifest-path src-tauri/Cargo.toml

      - name: Smoke test headless startup
        shell: bash
        run: |
          APP_DIR="$(mktemp -d)"
          PORT=19089
          LOG_PATH="${APP_DIR}/smoke.log"

          cat > "${APP_DIR}/config.json" <<EOF
          {
            "server": {
              "host": "127.0.0.1",
              "port": ${PORT}
            },
            "ui": {
              "locale": "en-US",
              "localeMode": "manual"
            }
          }
          EOF

          AOR_APP_DATA_DIR="${APP_DIR}" "${GITHUB_WORKSPACE}/dist/target/release/ai-open-router" >"${LOG_PATH}" 2>&1 &
          APP_PID=$!

          cleanup() {
            kill "${APP_PID}" 2>/dev/null || true
            wait "${APP_PID}" 2>/dev/null || true
          }
          trap cleanup EXIT

          for _ in {1..30}; do
            if ! kill -0 "${APP_PID}" 2>/dev/null; then
              echo "headless process exited unexpectedly"
              cat "${LOG_PATH}"
              exit 1
            fi

            if curl -fsS "http://127.0.0.1:${PORT}/api/health" >/dev/null; then
              echo "health check passed on Ubuntu 22.04"
              exit 0
            fi

            sleep 1
          done

          echo "health check timed out"
          cat "${LOG_PATH}"
          exit 1

  auto_tag:
    name: Auto Tag Release Version
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - verify
      - linux_smoke_ubuntu22
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Resolve version tag
        id: tag
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} already exists, skip."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} will be created."
          fi

      - name: Create and push tag
        if: steps.tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.tag.outputs.tag }}"
          git push origin "${{ steps.tag.outputs.tag }}"
