name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (Node 20)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Install Linux system dependencies (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Check version sync
        run: npm run version:check

      - name: Run CI checks
        run: npm run ci

      - name: Cargo check (Tauri backend)
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Cargo fmt check (Tauri backend)
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Cargo clippy (Tauri backend)
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets

      - name: Tauri module boundary check
        run: bash ./scripts/check-tauri-boundaries.sh

      - name: Cargo test (Tauri backend)
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Cargo contract tests (Tauri backend)
        run: cargo test --manifest-path src-tauri/Cargo.toml contract_

  auto_tag:
    name: Auto Tag Release Version
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - verify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Resolve version tag
        id: tag
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} already exists, skip."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} will be created."
          fi

      - name: Create and push tag
        if: steps.tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.tag.outputs.tag }}"
          git push origin "${{ steps.tag.outputs.tag }}"
